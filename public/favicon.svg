<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#111"/>
  <!-- Scissors icon -->
  <g transform="translate(50,50)" fill="none" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left blade -->
    <circle cx="-18" cy="-18" r="8" stroke="#FBBF24" fill="none"/>
    <line x1="-12" y1="-12" x2="18" y2="18"/>
    <!-- Right blade -->
    <circle cx="18" cy="-18" r="8" stroke="#FBBF24" fill="none"/>
    <line x1="12" y1="-12" x2="-18" y2="18"/>
  </g>
</svg>
